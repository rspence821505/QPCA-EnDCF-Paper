experiment:
  name: bias_variance_analysis
  description: Decompose ensemble filter performance into bias and variance components.
  seeds: [42, 123, 456, 789, 1011]

model:
  type: lorenz96
  n: 40
  F: 8.0
  dt: 0.01
  spinup_steps: 0

observations:
  m: 20 # Observation dimension (observe every other state)
  observe_every: 2 # Observe states 0, 2, 4, ..., 38
  noise_std: 1.5 # σ_obs - observation noise standard deviation
  steps_per_obs: 10 # Observations every 10 integration steps (T_obs = 0.1)

assimilation:
  window_length: 5
  n_windows: 50
  total_observations: 250
  ensemble_size: 10

bias_variance:
  n_monte_carlo: 10 # Number of ensemble realizations for B-V decomposition
  temporal_windows: [0, 12, 24, 36, 49] # Windows to analyze in detail
  "spatial_analysis": true # Compute spatially-resolved bias/variance
  metrics:
    - rmse
    - misfit
    - spread
    - bias_squared

filters:
  seq_enkf:
    stabilize: false
    inflation: 1.05
  enkf_4d:
    stabilize: true
    inflation: 1.02
  qpca_endcf:
    k: 1
    stabilize: true
    inflation: 1.0

output:
  save_realizations: false
  save_statistics: true
  save_directory: "../results/diagnostics/bias_variance_analysis"
