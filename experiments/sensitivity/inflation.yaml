experiment:
  name: "inflation_sensitivity"
  description: "Sensitivity analysis of multiplicative covariance inflation factor"
  seeds: [42, 123, 456]  # Multiple seeds for statistical robustness

model:
  type: "lorenz96"
  n: 40
  F: 8.0
  dt: 0.01
  spinup_steps: 0

observations:
  m: 20  # observe every other state
  observe_every: 2
  noise_std: 1.5
  steps_per_obs: 10  # observations every 0.1 time units

assimilation:
  ensemble_size: 10
  window_length: 5  # L - observations per window
  n_windows: 50  # W - number of windows
  total_observations: 250  # K = W * L = 50 * 5 = 250

# Key parameter being varied
inflation_factors: [1.0, 1.01, 1.02, 1.05, 1.10, 1.15, 1.20]  # » values to test

filters:
  seq_enkf:
    stabilize: false
    inflation: 1.0  # will be varied

  4d_enkf:
    stabilize: false
    inflation: 1.0  # will be varied

  qpca_endcf:
    k: 1  # number of PCA modes
    stabilize: true
    inflation: 1.0  # will be varied (expected to need less)

metrics:
  state:
    - rmse
    - pattern_correlation
  data:
    - relative_misfit
  ensemble:
    - spread
    - spread_skill_ratio
    - effective_rank
  computational:
    - runtime_per_window

# Output configuration
output:
  save_trajectories: false
  save_metrics: true
  save_ensembles: false
  results_dir: "../results/sensitivity/inflation"
