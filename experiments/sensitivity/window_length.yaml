experiment:
  name: "window_length_sensitivity"
  description: "Sensitivity analysis of assimilation window length L"
  seeds: [42, 123, 456] # Multiple seeds for statistical robustness

model:
  type: "lorenz96"
  n: 40
  F: 8.0
  dt: 0.01
  spinup_steps: 0

observations:
  m: 20 # observe every other state
  observe_every: 2
  noise_std: 1.5
  steps_per_obs: 10 # observations every 0.1 time units

assimilation:
  ensemble_size: 10
  window_length: 5 # L - observations per window
  n_windows: 80 # W - number of windows
  total_observations: 400 # K = W * L = 80 * 5 = 400

# Key parameter being varied
window_lengths: [1, 3, 5, 7, 10, 15] # L values to test

filters:
  seq_enkf:
    stabilize: true
    inflation: 1.0

  4d_enkf:
    stabilize: true
    inflation: 1.0

  qpca_endcf:
    k: 1 # number of PCA modes
    stabilize: true

metrics:
  state:
    - rmse
    - pattern_correlation
    - normalized_rmse
  data:
    - relative_misfit
    - innovation_consistency
  ensemble:
    - spread
    - spread_skill_ratio
    - effective_size
  computational:
    - runtime_per_window
    - memory_usage

# Output configuration
output:
  save_trajectories: false # Save space, only save metrics
  save_metrics: true
  save_ensembles: false
  results_dir: "../results/sensitivity/window_length"
